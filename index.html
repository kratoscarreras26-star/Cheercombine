let favorites = JSON.parse(localStorage.getItem("pa_cheer_favs") || "[]");
let currentSort = "name";
let showFavsOnly = false;
function saveFavs() { localStorage.setItem("pa_cheer_favs", JSON.stringify(favorites)); }
function isFav(n) { return favorites.includes(n); }
function toggleFav(n) {
  if (isFav(n)) favorites = favorites.filter(x => x !== n); else favorites.push(n);
  saveFavs(); render();
}
function toggleExportMenu(e) { e.stopPropagation(); document.getElementById('exportMenu').classList.toggle('open'); }
document.addEventListener('click', function() { document.getElementById('exportMenu').classList.remove('open'); });
function exportCsv(mode) {
  document.getElementById('exportMenu').classList.remove('open');
  var list = mode === 'starred' ? DATA.filter(function(s) { return isFav(s.name); }) : mode === 'filtered' ? getFiltered() : DATA;
  if (!list.length) { alert(mode === 'starred' ? "No starred schools to export. Tap the \u2605 on a school first!" : mode === 'filtered' ? "No schools match your current filters." : "No schools to export."); return; }
  var csvEsc = function(v) { v = String(v||""); return v.indexOf(",")>-1||v.indexOf('"')>-1||v.indexOf("\n")>-1 ? '"'+v.replace(/"/g,'""')+'"' : v; };
  var headers = ["School","Location","Conference","Division","Website","Programs","Sports Supported","Brand","Benefits","Tryout Info","Coach Name","Coach Title","Coach Email","Coach Phone","Instagram","Twitter","TikTok","Facebook"];
  var rows = [headers.join(",")];
  list.forEach(function(s) {
    var coach = s.coaches && s.coaches[0] ? s.coaches[0] : {};
    var socialMap = {};
    (s.socials||[]).forEach(function(x) { socialMap[x.platform.toLowerCase()] = x.handle||x.url||""; });
    rows.push([
      csvEsc(s.name), csvEsc(s.location), csvEsc(s.conference), csvEsc(s.division),
      csvEsc(s.website), csvEsc((s.programs||[]).join("; ")), csvEsc((s.sports||[]).join("; ")),
      csvEsc(s.brand), csvEsc((s.benefits||[]).join("; ")), csvEsc(s.tryout_info),
      csvEsc((coach.first_name||"")+" "+(coach.last_name||"")).trim(), csvEsc(coach.title),
      csvEsc(coach.email), csvEsc(coach.show_cell ? coach.cell : ""),
      csvEsc(socialMap.instagram||""), csvEsc(socialMap.twitter||socialMap.x||""),
      csvEsc(socialMap.tiktok||""), csvEsc(socialMap.facebook||"")
    ].join(","));
  });
  var blob = new Blob([rows.join("\n")], {type:"text/csv;charset=utf-8;"});
  var link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = mode === 'starred' ? "my_starred_schools.csv" : mode === 'filtered' ? "filtered_schools.csv" : "all_schools.csv";
  link.click();
  URL.revokeObjectURL(link.href);
}

});
document.getElementById("totalSchools").textContent = DATA.length;
document.getElementById("totalPrograms").textContent = allPrograms.size;
document.getElementById("totalConferences").textContent = allConfs.size;

const msState = {};
function createMS(id, options, placeholder) {
  msState[id] = { selected: new Set(), options: [...options].sort() };
  const wrap = document.getElementById(id);
  const trigger = document.createElement("button");
  trigger.className = "ms-trigger"; trigger.type = "button";
  trigger.innerHTML = '<span class="ms-label">' + placeholder + '</span><span class="ms-arrow">\u25BC</span>';
  const dd = document.createElement("div");
  dd.className = "ms-dropdown";
  const si = document.createElement("input");
  si.className = "ms-search"; si.placeholder = "Type to filter..."; si.type = "text";
  dd.appendChild(si);
  const ol = document.createElement("div"); ol.className = "ms-options"; dd.appendChild(ol);
  wrap.appendChild(trigger); wrap.appendChild(dd);
  function renderOpts() {
    const q = si.value.toLowerCase(); ol.innerHTML = "";
    msState[id].options.filter(o => !q || o.toLowerCase().includes(q)).forEach(o => {
      const el = document.createElement("div");
      el.className = "ms-opt" + (msState[id].selected.has(o) ? " selected" : "");
      el.innerHTML = '<span class="ms-check">' + (msState[id].selected.has(o) ? "\u2713" : "") + '</span><span>' + esc(o) + '</span>';
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        if (msState[id].selected.has(o)) msState[id].selected.delete(o); else msState[id].selected.add(o);
        renderOpts(); updTrig(); renderActiveFilters(); render();
      });
      ol.appendChild(el);
    });
  }
  function updTrig() {
    const n = msState[id].selected.size;
    if (n === 0) trigger.innerHTML = '<span class="ms-label">' + placeholder + '</span><span class="ms-arrow">\u25BC</span>';
    else trigger.innerHTML = '<span class="ms-count">' + n + '</span><span class="ms-label">' + [...msState[id].selected].slice(0,2).join(", ") + (n > 2 ? "..." : "") + '</span><span class="ms-arrow">\u25BC</span>';
  }
  trigger.addEventListener("click", (e) => {
    e.stopPropagation();
    const isOpen = dd.classList.contains("open");
    closeAllMS();
    if (!isOpen) { dd.classList.add("open"); trigger.classList.add("open"); si.value = ""; renderOpts(); si.focus(); }
  });
  si.addEventListener("input", renderOpts);
  si.addEventListener("click", (e) => e.stopPropagation());
  renderOpts();
}
function closeAllMS() { document.querySelectorAll(".ms-dropdown.open").forEach(d => { d.classList.remove("open"); d.previousElementSibling.classList.remove("open"); }); }
document.addEventListener("click", closeAllMS);
function renderActiveFilters() {
  const c = document.getElementById("activeFilters");
  const labels = { filterProgram:"Program", filterConference:"Conference", filterBrand:"Brand", filterBenefit:"Benefit", filterTryouts:"Tryouts", filterScholarship:"Scholarship" };
  const chips = [];
  Object.keys(msState).forEach(id => {
    msState[id].selected.forEach(val => {
      chips.push('<span class="active-filter">' + labels[id] + ": " + esc(val) + ' <span class="af-x" data-id="' + id + '" data-val="' + esc(val).replace(/"/g,"&quot;") + '">\u2715</span></span>');
    });
  });
  c.innerHTML = chips.join("");
  c.querySelectorAll(".af-x").forEach(x => {
    x.addEventListener("click", () => {
      msState[x.dataset.id].selected.delete(x.dataset.val);
      const w = document.getElementById(x.dataset.id);
      const t = w.querySelector(".ms-trigger");
      const n = msState[x.dataset.id].selected.size;
      const ph = w.closest(".filter-group").querySelector("label").textContent;
      if (n === 0) t.innerHTML = '<span class="ms-label">' + ph + '</span><span class="ms-arrow">\u25BC</span>';
      else t.innerHTML = '<span class="ms-count">' + n + '</span><span class="ms-label">' + [...msState[x.dataset.id].selected].slice(0,2).join(", ") + (n > 2 ? "..." : "") + '</span><span class="ms-arrow">\u25BC</span>';
      renderActiveFilters(); render();
    });
  });
}
createMS("filterProgram", allPrograms, "All Programs");
createMS("filterConference", allConfs, "All Conferences");
createMS("filterBrand", allBrands, "All Brands");
createMS("filterBenefit", allBenefits, "All Benefits");
createMS("filterTryouts", allTryouts, "All");
createMS("filterScholarship", new Set(["Full scholarships","Partial scholarships"]), "Any Scholarships");
function esc(s) { if (!s) return ""; const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function getFiltered() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const progs = msState.filterProgram.selected;
  const confs = msState.filterConference.selected;
  const brands = msState.filterBrand.selected;
  const bens = msState.filterBenefit.selected;
  const tryouts = msState.filterTryouts.selected;
  const schols = msState.filterScholarship.selected;
  let r = DATA.filter(s => {
    if (showFavsOnly && !isFav(s.name)) return false;
    if (q) {
      const hay = [s.name, s.location, s.conference, ...s.programs, ...s.coaches.map(c => c.first_name+" "+c.last_name), s.brand, ...s.benefits, s.fun_fact].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (progs.size && !s.programs.some(p => progs.has(p))) return false;
    if (confs.size && !confs.has(s.conference)) return false;
    if (brands.size && (!s.brand || ![...brands].some(b => s.brand.includes(b)))) return false;
    if (bens.size && !s.benefits.some(b => bens.has(b))) return false;
    if (tryouts.size && !s.tryouts_recruit.some(t => tryouts.has(t))) return false;
    if (schols.size && !s.benefits.some(b => schols.has(b))) return false;
    return true;
  });
  r.sort((a,b) => {
    switch(currentSort) {
      case "name": return a.name.localeCompare(b.name);
      case "name-desc": return b.name.localeCompare(a.name);
      case "conference": return (a.conference||"zzz").localeCompare(b.conference||"zzz");
      case "location": return a.location.localeCompare(b.location);
      default: return 0;
    }
  });
  return r;
}
function coachHtml(c) {
  let h = '<div class="coach-card"><div class="coach-name">'+esc(c.first_name)+" "+esc(c.last_name)+"</div>";
  if (c.title) h += '<div class="coach-title">'+esc(c.title)+"</div>";
  h += '<div class="coach-contact">';
  if (c.email) h += '&#128231; <a href="mailto:'+esc(c.email)+'">'+esc(c.email)+"</a>";
  if (c.show_cell && c.cell) h += "<br>&#128241; <a href=\"tel:"+esc(c.cell)+"\">"+esc(c.cell)+"</a>";
  if (c.other) h += '<br><span style="color:var(--cp-text-muted);font-size:0.75rem">'+esc(c.other)+"</span>";
  h += "</div></div>";
  return h;
}
function escName(n) { return n.replace(/'/g, "\\'"); }
function cardHtml(s) {
  const fav = isFav(s.name);
  let h = '<div class="card"><div class="card-header">';
  h += '<button class="bookmark-btn '+(fav?"saved":"")+'" onclick="event.stopPropagation();toggleFav(\''+escName(s.name)+'\')">'+( fav?"&#9733;":"&#9734;")+"</button>";
  h += '<img class="school-logo" src="'+(LOGOS[DATA.indexOf(s)]||'')+'" alt="" onerror="this.style.display=\'none\'"><div class="header-text"><h2>'+esc(s.name)+'</h2><div class="meta"><span>&#128205; '+esc(s.location)+'</span><span>&#127941; '+esc(s.conference)+"</span></div></div></div>";
  h += '<div class="card-body" onclick="openModal(\''+escName(s.name)+'\')" style="cursor:pointer">';
  if (s.programs.length) {
    h += '<div class="section"><div class="section-title">&#128227; Programs</div><div class="tags">';
    s.programs.forEach(p => h += '<span class="tag">'+esc(p)+"</span>");
    h += "</div></div>";
  }
  if (s.brand || s.divisions.length) {
    h += '<div class="section"><div class="section-title">&#127942; Competition</div><div class="tags">';
    if (s.brand) s.brand.split("\n").forEach(b => { if (b.trim()) h += '<span class="tag blue">'+esc(b.trim())+"</span>"; });
    s.divisions.forEach(d => h += '<span class="tag green">'+esc(d)+"</span>");
    if (s.nca_level) h += '<span class="tag amber">'+esc(s.nca_level)+"</span>";
    h += "</div></div>";
  }
  if (s.coaches.length) {
    h += '<div class="section"><div class="section-title">&#128100; Coaches Attending</div>';
    s.coaches.slice(0,2).forEach(c => h += coachHtml(c));
    if (s.coaches.length > 2) h += '<div style="font-size:0.75rem;color:var(--cp-text-muted);margin-top:0.25rem">+'+(s.coaches.length-2)+' more &mdash; click for details</div>';
    h += "</div>";
  }
  if (s.benefits.length) {
    h += '<div class="section"><div class="section-title">&#127873; Athlete Benefits</div><div class="tags">';
    s.benefits.forEach(b => {
      const cls = b.toLowerCase().includes("scholarship") ? "green" : "";
      h += '<span class="tag '+cls+'">'+esc(b)+"</span>";
    });
    h += "</div></div>";
  }
  if (s.tryouts_recruit.length) {
    h += '<div class="section"><div class="section-title">&#128203; Tryouts &amp; Recruiting</div><div class="tags">';
    s.tryouts_recruit.forEach(t => h += '<span class="tag blue">'+esc(t)+"</span>");
    h += "</div></div>";
  }
  h += "</div>";
  h += '<div class="card-footer">';
  if (s.website) h += '<a href="'+esc(s.website)+'" target="_blank">&#127760; Website</a>';
  s.socials.forEach(soc => {
    let url = soc.handle;
    if (soc.platform.toLowerCase()==="instagram" && !url.startsWith("http")) url = "https://instagram.com/"+url;
    else if (soc.platform.toLowerCase()==="twitter" && !url.startsWith("http")) url = "https://twitter.com/"+url;
    else if (soc.platform.toLowerCase()==="tiktok" && !url.startsWith("http")) url = "https://tiktok.com/@"+url;
    else if (!url.startsWith("http")) url = "https://"+url;
    h += '<a href="'+esc(url)+'" target="_blank">'+esc(soc.platform)+": @"+esc(soc.handle)+"</a>";
  });
  h += "</div></div>";
  return h;
}

function closeModal() {

}
document.getElementById("modalOverlay").addEventListener("click", e => { if (e.target === document.getElementById("modalOverlay")) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
function render() {
  const results = getFiltered();
  document.getElementById("resultsCount").innerHTML = "Showing <strong>"+results.length+"</strong> of "+DATA.length+" schools"+(showFavsOnly?" (&#9733; favorites only)":"");
  const grid = document.getElementById("cardGrid");
  grid.innerHTML = results.length ? results.map(cardHtml).join("") : '<div class="no-results">No schools match your filters. Try adjusting your search.</div>';
  const tbody = document.getElementById("listBody");

      +"<td><img class=\"school-logo-sm\" src=\""+( LOGOS[DATA.indexOf(s)]||"")+ "\" onerror=\"this.style.display='none'\"><strong>"+esc(s.name)+"</strong></td>"

      +"<td>"+esc(s.conference)+"</td>"

      +'<td><button class="bookmark-btn '+(fav?"saved":"")+'" onclick="event.stopPropagation();toggleFav(\''+escName(s.name)+'\')" style="position:static">'+(fav?"&#9733;":"&#9734;")+"</button></td>"

document.getElementById("searchInput").addEventListener("input", render);
// multi-select handles its own events

document.getElementById("clearFilters").addEventListener("click", () => {

(function initMobile() {

  document.body.appendChild(nav);

  function openDrawer() {
    sidebar.classList.add('drawer-open');
    backdrop.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    sidebar.classList.remove('drawer-open');
    backdrop.classList.remove('active');
    if (!document.getElementById('modalOverlay').classList.contains('active'))
      document.body.style.overflow = '';
  }

  backdrop.addEventListener('click', closeDrawer);
  showBtn.addEventListener('click', closeDrawer);
  handle.addEventListener('click', function() {
    if (sidebar.classList.contains('drawer-open')) closeDrawer();
  });

  // Swipe-down to dismiss
  var touchStartY = 0, drawerScrollTop = 0;
  sidebar.addEventListener('touchstart', function(e) {
    touchStartY = e.touches[0].clientY;
    drawerScrollTop = sidebar.scrollTop;
  }, { passive: true });
  sidebar.addEventListener('touchmove', function(e) {
    if (drawerScrollTop > 5) return;
    if (e.touches[0].clientY - touchStartY > 60) closeDrawer();
  }, { passive: true });

  // Bottom nav handlers
  nav.querySelectorAll('.bnav-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var action = btn.dataset.action;
      if (action === 'filter') { openDrawer(); return; }
      if (action === 'export') { toggleExportMenu(e); return; }
      closeDrawer();
      if (action === 'search') {
        var input = document.getElementById('searchInput');
        input.scrollIntoView({ behavior: 'smooth', block: 'start' });
        setTimeout(function() { input.focus(); }, 350);
      } else if (action === 'favs') {
        showFavsOnly = !showFavsOnly;
        render();
      } else if (action === 'home') {
        if (showFavsOnly) { showFavsOnly = false; render(); }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  });

  // Wrap render for mobile state
  var _origRender = window.render;
  window.render = function mobileRender() {
    _origRender();
    var results = getFiltered();
    showBtn.textContent = 'Show ' + results.length + ' School' + (results.length !== 1 ? 's' : '');
    var favsBtn = nav.querySelector('[data-action="favs"]');
    favsBtn.classList.toggle('active-fav', showFavsOnly);

    Object.keys(msState).forEach(function(id) { ac += msState[id].selected.size; });
    filterBtn.classList.toggle('has-badge', ac > 0);
    nav.querySelector('[data-action="home"]').classList.toggle('active', !showFavsOnly);
  };

  // Force card view
  document.getElementById('cardGrid').classList.add('active');
  document.getElementById('listView').classList.remove('active');

  // Lock scroll on modal
  var _origOpen = window.openModal;
  window.openModal = function(name) { _origOpen(name); document.body.style.overflow = 'hidden'; };
  var _origClose = window.closeModal;
  window.closeModal = function() {
    _origClose();
    if (!sidebar.classList.contains('drawer-open')) document.body.style.overflow = '';
  };
})();

render();
